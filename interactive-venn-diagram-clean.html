<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Interactive Venn Fixed</title><style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#fff}
.wrap{height:100vh;display:flex;align-items:center;justify-content:center;padding:8px}
.venn{position:relative;width:min(920px,88vw,80vh);aspect-ratio:1/1.16}
a{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;text-decoration:none;color:#000;font-weight:700;line-height:1.2;transition:.3s}
.circle{width:58%;aspect-ratio:1;border-radius:50%;mix-blend-mode:multiply;z-index:1}
.top{top:4%;left:50%;transform:translateX(-50%);background:#5b7f98;font-size:clamp(14px,1.6vw,24px)}
.left{top:38%;left:0;background:#9ab4e2;font-size:clamp(14px,1.6vw,24px)}
.right{top:38%;right:0;background:#838fb4;font-size:clamp(14px,1.6vw,24px)}
.center{width:18%;aspect-ratio:1;left:50%;top:50%;transform:translate(-50%,-50%);background:#425aa4;border-radius:50%;z-index:999;pointer-events:auto;font-size:clamp(10px,0.9vw,15px)}
.venn:has(a:hover) a{opacity:.25}.venn a:hover{opacity:1!important}.top:hover{transform:translateX(-50%) scale(1.03);z-index:10}.left:hover,.right:hover{transform:scale(1.03);z-index:10}.center:hover{transform:translate(-50%,-50%) scale(1.08);z-index:1000}
</style></head><body><div class="wrap"><div class="venn">
