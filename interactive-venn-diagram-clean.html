<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Interactive Leadership Venn Diagram</title><style>:root{--top:#5b7f98;--left:#9ab4e2;--right:#838fb4;--centre:#425aa4}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif}.venn-wrap{width:min(100vw,1180px);margin:auto;padding:24px}.venn{position:relative;width:100%;aspect-ratio:1/1.16;min-height:640px;isolation:isolate}.circle-link,.centre-link{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;text-decoration:none;color:#000;font-weight:800;line-height:1.35;transition:opacity .28s ease,transform .36s ease,filter .28s ease}.circle-link{width:58%;aspect-ratio:1;border-radius:50%;font-size:clamp(26px,4.3vw,54px);padding:7%;mix-blend-mode:multiply}.top{top:4%;left:50%;transform:translateX(-50%);background:var(--top)}.left{top:38%;left:0;background:var(--left)}.right{top:38%;right:0;background:var(--right)}.centre-link{width:18%;aspect-ratio:1/.94;left:50%;top:49.5%;transform:translate(-50%,-50%);background:var(--centre);border-radius:50%;font-size:clamp(20px,2.65vw,34px);z-index:5}.venn.is-visible .circle-link,.venn.is-visible .centre-link{animation:floatIn .85s both}@keyframes floatIn{from{opacity:0;filter:blur(6px)}to{opacity:1;filter:blur(0)}}.venn:has(.circle-link:hover) .circle-link,.venn:has(.centre-link:hover) .circle-link{opacity:.22;filter:saturate(.7)}.venn:has(.circle-link:hover) .centre-link,.venn:has(.centre-link:hover) .centre-link{opacity:.28;filter:saturate(.7)}.circle-link:hover,.circle-link:focus-visible{opacity:1!important;filter:drop-shadow(0 24px 40px rgba(0,0,0,.16))!important;transform:scale(1.035);z-index:8;mix-blend-mode:normal}.top:hover{transform:translateX(-50%) scale(1.035)}.left:hover{transform:translateX(-2%) scale(1.035)}.right:hover{transform:translateX(2%) scale(1.035)}.centre-link:hover{opacity:1!important;transform:translate(-50%,-50%) scale(1.08);z-index:10}</style></head><body><main class="venn-wrap"><section class="venn" id="interactiveVenn"><a class="circle-link top" href="https://invest.vesteyholdings.com/resources?space&gid=0&folderid=477&urlm=241A7776-EAF2-4289-BFB2487DC7A171C5" target="_blank">Leading<br>your team<br>effectively</a><a class="circle-link left" href="https://invest.vesteyholdings.com/resources?folderid=478" target="_blank">Developing<br>your team</a><a class="circle-link right" href="https://invest.vesteyholdings.com/resources?folderid=479" target="_blank">Driving<br>performance</a><a class="centre-link" href="https://invest.vesteyholdings.com/resources?folderid=480" target="_blank">Leading<br>self</a></section></main><script>const v=document.getElementById('interactiveVenn');new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&v.classList.add('is-visible')),{threshold:.28}).observe(v);</script></body></html>
